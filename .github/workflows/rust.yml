name: Build & Bundle

on:
  workflow_dispatch:

env:
  BINARY_NAME: idevice_pair
  APP_NAME: idevice_pair
  ICON_PNG: icon.png
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            toolfile: appimagetool-x86_64.AppImage
          - arch: aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            toolfile: appimagetool-aarch64.AppImage

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Use Wild linker
        uses: davidlattimore/wild-action@latest

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            appstream \
            libatk1.0-dev \
            libfuse2t64 \
            libglib2.0-dev \
            libgtk-3-dev \
            pkg-config \
            usbmuxd

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Build binary
        run: cargo build --release --no-default-features --bin ${{ env.BINARY_NAME }} --target ${{ matrix.target }}

      - name: Download appimagetool
        run: |
          wget -c https://github.com/AppImage/AppImageKit/releases/download/continuous/${{ matrix.toolfile }} \
            -O appimagetool.AppImage
          chmod +x appimagetool.AppImage

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/lib AppDir/usr/share/icons/hicolor/256x256/apps AppDir/etc/udev/rules.d
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} AppDir/usr/bin/
          cp "$(which usbmuxd)" AppDir/usr/bin/
          sudo cp /lib/udev/rules.d/39-usbmuxd.rules AppDir/etc/udev/rules.d/
          ICON_NAME=${ICON_PNG##*/}; BASENAME=${ICON_NAME%.*}
          cp "${{ env.ICON_PNG }}" "AppDir/${BASENAME}.png"
          cp "${{ env.ICON_PNG }}" "AppDir/usr/share/icons/hicolor/256x256/apps/${BASENAME}.png"
          cat > AppDir/${{ env.BINARY_NAME }}.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=${{ env.APP_NAME }}
          Exec=${{ env.BINARY_NAME }} %u
          Icon=${BASENAME}
          Categories=Utility;
          EOF
          ln -s usr/bin/${{ env.BINARY_NAME }} AppDir/AppRun
          chmod +x AppDir/AppRun

      - name: Build AppImage
        run: |
          mkdir -p dist
          FILENAME="dist/${{ env.APP_NAME }}--linux-${{ matrix.arch }}.AppImage"
          ./appimagetool.AppImage AppDir "$FILENAME"

      - name: Upload Linux bundle
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APP_NAME }}--linux-${{ matrix.arch }}
          path: dist/*

  build-windows:
    name: Build Windows ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-pc-windows-gnu
            arch: x86_64
            runner: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install mingw-w64
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 nasm

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build binary
        run: |
          cargo build --release --no-default-features --bin ${{ env.BINARY_NAME }} --target ${{ matrix.target }}
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe \
            dist/${{ env.APP_NAME }}--windows-${{ matrix.arch }}.exe

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APP_NAME }}--windows-${{ matrix.arch }}
          path: dist/*.exe

  build-macos-slices:
    name: Build macOS ${{ matrix.arch }} slice
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm
            suffix: arm64
            osxcross_prefix: arm64-apple-darwin21.4
          - target: x86_64-apple-darwin
            arch: intel
            suffix: x86_64
            osxcross_prefix: x86_64-apple-darwin21.4

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup osxcross
        uses: Timmmm/setup-osxcross@v3
        with:
          osx-version: "12.3"

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Build binary
        run: |
          target_env=$(echo "${{ matrix.target }}" | tr '-' '_')
          target_env_upper=$(echo "${target_env}" | tr '[:lower:]' '[:upper:]')
          prefix="${{ matrix.osxcross_prefix }}"
          osxcross_bin="$(dirname "$(command -v "${prefix}-clang")")"
          osxcross_root="$(cd "${osxcross_bin}/.." && pwd)"
          sdk_dir="${osxcross_root}/SDK"
          if [ -d "${sdk_dir}" ]; then
            sdkroot="$(ls -d "${sdk_dir}"/MacOSX*.sdk 2>/dev/null | sort -V | tail -n1)"
            if [ -n "${sdkroot}" ]; then
              export SDKROOT="${sdkroot}"
            fi
          fi
          export MACOSX_DEPLOYMENT_TARGET="11.0"
          ld_path=""
          for name in "${prefix}-ld" "${prefix}-ld64" "ld64" "ld"; do
            if [ -x "${osxcross_bin}/${name}" ]; then
              ld_path="${osxcross_bin}/${name}"
              break
            fi
          done
          export "CC_${target_env}=${osxcross_bin}/${prefix}-clang"
          export "CXX_${target_env}=${osxcross_bin}/${prefix}-clang++"
          export "AR_${target_env}=${osxcross_bin}/${prefix}-ar"
          export "RANLIB_${target_env}=${osxcross_bin}/${prefix}-ranlib"
          export "CARGO_TARGET_${target_env_upper}_LINKER=${osxcross_bin}/${prefix}-clang"
          if [ -n "${ld_path}" ]; then
            export "CFLAGS_${target_env}=-fuse-ld=${ld_path}"
            export "CXXFLAGS_${target_env}=-fuse-ld=${ld_path}"
            export "LDFLAGS_${target_env}=-fuse-ld=${ld_path}"
            export RUSTFLAGS="${RUSTFLAGS:+$RUSTFLAGS }-C link-arg=-fuse-ld=${ld_path}"
          fi
          cargo build --release --no-default-features --bin ${{ env.BINARY_NAME }} --target ${{ matrix.target }}
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} \
            dist/${{ env.BINARY_NAME }}-macos-${{ matrix.suffix }}

      - name: Upload macOS slice
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BINARY_NAME }}-macos-slice-${{ matrix.arch }}
          path: dist/*

  build-macos-universal:
    name: Create Universal macOS DMG
    runs-on: macos-latest
    needs: build-macos-slices
    env:
      HAVE_SIGNING_SECRETS: ${{ secrets.DEV_ID_P12_BASE64 != '' && secrets.DEV_ID_P12_PASSWORD != '' && secrets.DEV_IDENTITY_NAME != '' }}
      HAVE_NOTARIZE_SECRETS: ${{ secrets.NOTARIZE_APPLE_ID != '' && secrets.NOTARIZE_APP_SPECIFIC_PASS != '' && secrets.NOTARIZE_TEAM_ID != '' }}

    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          df -h
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/*
          sudo rm -rf /Applications/Xcode.app/Contents/Developer/Platforms/WatchOS.platform
          sudo rm -rf /Applications/Xcode.app/Contents/Developer/Platforms/AppleTVOS.platform
          sudo rm -rf /Users/runner/Library/Android
          sudo rm -rf /usr/local/lib/node_modules
          df -h

      - name: Download ARM slice
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.BINARY_NAME }}-macos-slice-arm
          path: dist/slices

      - name: Download Intel slice
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.BINARY_NAME }}-macos-slice-intel
          path: dist/slices

      - name: Import Developer ID Certificate
        if: env.HAVE_SIGNING_SECRETS == 'true'
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.DEV_ID_P12_BASE64 }}
          p12-password: ${{ secrets.DEV_ID_P12_PASSWORD }}

      - name: Create Universal App
        run: |
          APP="${{ env.APP_NAME }}.app"
          VERSION="$(awk -F '"' '/^version = / { print $2; exit }' Cargo.toml)"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"

          lipo \
            dist/slices/${{ env.BINARY_NAME }}-macos-x86_64 \
            dist/slices/${{ env.BINARY_NAME }}-macos-arm64 \
            -create -output "$APP/Contents/MacOS/${{ env.APP_NAME }}"
          rm -rf dist/slices

          cat > "$APP/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
                   "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key><string>${{ env.APP_NAME }}</string>
            <key>CFBundleDisplayName</key><string>${{ env.APP_NAME }}</string>
            <key>CFBundleIdentifier</key><string>com.github.se2cird2.${{ env.APP_NAME }}</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleExecutable</key><string>${{ env.APP_NAME }}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleIconFile</key><string>icon.icns</string>
            <key>CFBundleIconName</key><string>icon</string>
          </dict></plist>
          EOF

          cp icon.icns "$APP/Contents/Resources/"
          cp Assets.car "$APP/Contents/Resources/"
          xattr -rc "$APP"

      - name: Code-sign with Hardened Runtime & Timestamp
        if: env.HAVE_SIGNING_SECRETS == 'true'
        run: |
          APP="${{ env.APP_NAME }}.app"
          codesign --force --deep --options runtime --timestamp \
            --sign "${{ secrets.DEV_IDENTITY_NAME }}" "$APP"

      - name: Fix Permissions
        run: |
          APP="${{ env.APP_NAME }}.app"
          find "$APP" -type d -exec chmod 755 {} +
          find "$APP" -type f -exec chmod 644 {} +
          chmod +x "$APP/Contents/MacOS/${{ env.APP_NAME }}"

      - name: Create DMG
        run: |
          DMG="dist/${{ env.APP_NAME }}--macos-universal.dmg"
          mkdir -p dist dmg-staging
          trap 'rm -rf dmg-staging' EXIT
          mv "${{ env.APP_NAME }}.app" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          APP_SIZE_KB="$(du -sk dmg-staging | awk '{ print $1 }')"
          DMG_SIZE_KB="$((APP_SIZE_KB * 2 + 131072))"
          sync
          hdiutil create \
            -volname "${{ env.APP_NAME }}" \
            -srcfolder dmg-staging \
            -size "${DMG_SIZE_KB}k" \
            -ov -format UDZO \
            "$DMG"
          echo "$DMG" > dmg-path.txt

      - name: Notarize & Staple DMG
        if: env.HAVE_NOTARIZE_SECRETS == 'true'
        run: |
          DMG=$(cat dmg-path.txt)
          xcrun notarytool submit "$DMG" \
            --apple-id "${{ secrets.NOTARIZE_APPLE_ID }}" \
            --password "${{ secrets.NOTARIZE_APP_SPECIFIC_PASS }}" \
            --team-id "${{ secrets.NOTARIZE_TEAM_ID }}" \
            --wait --verbose
          xcrun stapler staple "$DMG"

      - name: Upload Universal DMG
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APP_NAME }}--macos-universal
          path: dist/${{ env.APP_NAME }}--macos-universal.dmg
